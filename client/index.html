<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="application-name" content="ArchiveCore" />
    <meta name="description" content="System zarządzania archiwum dokumentów, akt osobowych i spisów zdawczo-odbiorczych" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ArchiveCore" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <script>
      (() => {
        const theme = localStorage.getItem('archivecore-theme') || 'light';
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        document.documentElement.classList.toggle('dark', resolved === 'dark');
        document.documentElement.dataset.theme = theme;
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) metaThemeColor.content = resolved === 'dark' ? '#111827' : '#2563eb';
      })();
    </script>
    <title>ArchiveCore — System Zarządzania Archiwum</title>
  </head>
  <body class="bg-gray-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
